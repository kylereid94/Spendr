<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spendr - Transactions</title>

    <link href="src/output.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css"
    />
  </head>
  <body class="">
    <div class="grow mt-6 p-6">
      <!--header-->
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">
          Hello, <span id="username" class="text-darkmint">User</span>
        </h1>
      </div>

      <!--main-->
      <div class="bg-smoke rounded-2xl p-4 mt-8 space-y-4">
        <!--buttons-->
        <div class="grid grid-cols-2 space-x-4">
          <a class="btn bg-carbon text-white rounded-2xl h-12">
            <i class="fi fi-sr-wallet-arrow pt-1 text-lg"></i>Withdrawal
          </a>
          <a class="btn bg-darkmint text-white rounded-2xl h-12">
            Deposit<i class="fi fi-sr-wallet-income pt-1 text-lg"></i>
          </a>
        </div>
        <!--balance card-->
        <div class="bg-white py-4 px-6 rounded-xl flex items-center shadow-sm">
          <img src="assets/money-bag.png" class="w-14 -rotate-5" />
          <div class="ml-4 grow">
            <h1 class="text-sm opacity-60">Current Balance</h1>
            <h1 id="acctBalance" class="text-3xl font-semibold">$1234.56</h1>
          </div>
          <a
            class="btn border-none bg-smoke rounded-full h-8 opacity-80 hover:opacity-100"
            ><i class="fi fi-sr-eye-crossed pt-1 pr-1"></i>Hide</a
          >
        </div>
        <!--divider-->
        <div class="mt-8 mb-4">
          <div class="divider text-sm opacity-60">Looking Forward</div>
        </div>
        <!--estimate card-->
        <div class="bg-white py-4 px-6 rounded-xl flex items-center shadow-sm">
          <div class="flex justify-end items-center flex-col relative">
            <img src="assets/calendar.png" class="w-15" />
            <div class="absolute bottom-1">
              <h1 class="text-xl h-5">00</h1>
              <h1 class="text-xs opacity-60">JAN</h1>
            </div>
          </div>
          <div class="ml-4 grow">
            <h1 class="text-sm opacity-60">Estimated Balance</h1>
            <h1 id="acctBalance" class="text-3xl font-semibold">$1234.56</h1>
          </div>
          <a
            class="btn btn-circle border-0 bg-[rgba(var(--color-lightmint),.2)]"
            ><i class="fi fi-sr-calendar-day pt-1"></i
          ></a>
        </div>
      </div>
    </div>

    <div class="dock">
      <button>
        <i class="fi fi-sr-house-blank"></i>
        <span class="dock-label">Home</span>
      </button>
      <button class="dock-active">
        <i class="fi fi-sr-receipt"></i>
        <span class="dock-label">Transactions</span>
      </button>
      <button>
        <i class="fi fi-sr-piggy-bank"></i>
        <span class="dock-label">Savings</span>
      </button>
      <button>
        <i class="fi fi-sr-circle-user"></i>
        <span class="dock-label">Account</span>
      </button>
    </div>
  </body>
</html>
