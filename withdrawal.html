<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spendr - Withdrawal</title>

    <link href="src/output.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css"
    />
  </head>
  <body class="">
    <div class="grow mt-6 p-6">
      <!--header-->
      <div class="flex justify-between">
        <div class="flex gap-2 items-center">
          <a id="backBtn" class="btn btn-square btn-sm border-0 bg-smoke"
            ><i class="fi fi-sr-angle-left pt-1"></i
          ></a>
          <h1 class="text-2xl font-bold">Add Withdrawal</h1>
        </div>
        <div>
          <a
            id="submitWithdrawalBtn"
            class="btn btn-circle border-0 bg-darkmint text-white"
            ><i class="fi fi-sr-check pt-1 text-lg"></i
          ></a>
        </div>
      </div>

      <!--tabs-->
      <div class="tabBar">
        <a id="oneTimeBtn" class="tab tab-active">One Time</a>
        <a id="recurringBtn" class="tab">Reoccuring</a>
      </div>

      <!--input form-->
      <div class="flex flex-col items-center mt-4">
        <input
          id="amountInput"
          type="number"
          class="input w-40 h-12 rounded-full border-0 bg-smoke text-center text-xl"
          placeholder="$00.00"
        />
        <select id="categorySelect" class="select mt-4 h-12 rounded-lg w-full">
          <option disabled selected>Category</option>
          <option disabled>Auto</option>
          <option>Car Insurance</option>
          <option>Car Payment</option>
          <option>Gas</option>
          <option disabled>Bills</option>
          <option>Rent</option>
          <option>Subscription</option>
          <option>Other Bill</option>
          <option disabled>Debt</option>
          <option>Credit Card Payment</option>
          <option>Layaway</option>
          <option>Vacation</option>
          <option disabled>Food</option>
          <option>Fast Food</option>
          <option>Groceries</option>
          <option>Restaurant</option>
          <option>Vending Machine</option>
          <option disabled>Shopping</option>
          <option>Video Games</option>
          <option>Other Shopping</option>
        </select>
        <label class="input w-full h-12 rounded-lg mt-4">
          <i class="fi fi-sr-edit pt-1 text-xl text-neutral-300"></i>
          <input id="descriptionInput" type="text" placeholder="Description" />
        </label>
      </div>
    </div>

    <div class="dock">
      <a href="index.html">
        <i class="fi fi-sr-house-blank"></i>
        <span class="dock-label">Home</span>
      </a>
      <a href="transactions.html">
        <i class="fi fi-sr-receipt"></i>
        <span class="dock-label">Transactions</span>
      </a>
      <a href="savings.html">
        <i class="fi fi-sr-piggy-bank"></i>
        <span class="dock-label">Savings</span>
      </a>
      <a href="account.html">
        <i class="fi fi-sr-circle-user"></i>
        <span class="dock-label">Account</span>
      </a>
    </div>
    <script>
      document.getElementById("backBtn").addEventListener("click", () => {
        window.history.back();
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
      const { createClient } = supabase;

      const SUPABASE_URL = "https://mpzpdffdloiamoyvwock.supabase.co";
      const SUPABASE_KEY = "sb_publishable_r9wBzPC3t6JXFTMoc5vS4Q_MCGmIsE3";

      const client = createClient(SUPABASE_URL, SUPABASE_KEY);

      const oneTimeBtn = document.getElementById("oneTimeBtn");
      const recurringBtn = document.getElementById("recurringBtn");
      const amountInput = document.getElementById("amountInput");
      const categorySelect = document.getElementById("categorySelect");
      const descriptionInput = document.getElementById("descriptionInput");
      const submitWithdrawalBtn = document.getElementById(
        "submitWithdrawalBtn",
      );

      let amountDigits = "";

      function formatCurrencyFromDigits(digits) {
        if (!digits) return "0.00";
        return (parseInt(digits, 10) / 100).toFixed(2);
      }

      amountInput.addEventListener("keydown", (e) => {
        // Allow tab, arrows, etc.
        if (e.key === "Tab" || e.key === "ArrowLeft" || e.key === "ArrowRight")
          return;

        e.preventDefault();

        if (e.key === "Backspace") {
          amountDigits = amountDigits.slice(0, -1);
        } else if (/\d/.test(e.key)) {
          amountDigits += e.key;
        }

        amountInput.value = formatCurrencyFromDigits(amountDigits);
      });

      let isRecurring = false;

      function setRecurringToggle(recurring) {
        isRecurring = recurring;

        oneTimeBtn.classList.remove("tab-active");
        recurringBtn.classList.remove("tab-active");

        if (isRecurring) {
          recurringBtn.classList.add("tab-active");
        } else {
          oneTimeBtn.classList.add("tab-active");
        }
      }

      function getTodayDateString() {
        const today = new Date();
        const year = today.getFullYear();
        const month = String(today.getMonth() + 1).padStart(2, "0");
        const day = String(today.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function getWithdrawalAmount() {
        if (!amountDigits) return null;
        return -Math.abs(parseInt(amountDigits, 10) / 100);
      }

      async function initWithdrawalPage() {
        const { data, error } = await client
          .from("transactions")
          .select("*")
          .limit(1);

        console.log("Supabase ready");
        console.log("DATA:", data);
        console.log("ERROR:", error);

        setRecurringToggle(false);
      }

      async function addWithdrawal(withdrawalData) {
        const { data, error } = await client
          .from("transactions")
          .insert([withdrawalData])
          .select();

        return { data, error };
      }

      oneTimeBtn.addEventListener("click", () => {
        setRecurringToggle(false);
      });

      recurringBtn.addEventListener("click", () => {
        setRecurringToggle(true);
      });

      submitWithdrawalBtn.addEventListener("click", async (event) => {
        event.preventDefault();

        const amount = getWithdrawalAmount();
        const category = categorySelect.value.trim();
        const description = descriptionInput.value.trim();

        if (amount === null) {
          alert("Please enter a valid withdrawal amount.");
          return;
        }

        if (!category) {
          alert("Please choose a category.");
          return;
        }

        if (!description) {
          alert("Please enter a description.");
          return;
        }

        const withdrawalData = {
          Date: getTodayDateString(),
          Description: description,
          Category: category,
          Amount: amount,
          Recurring: isRecurring,
        };

        console.log("Submitting withdrawal:", withdrawalData);

        submitWithdrawalBtn.disabled = true;

        const originalButtonText = submitWithdrawalBtn.textContent;

        try {
          const { data, error } = await addWithdrawal(withdrawalData);

          console.log("INSERT DATA:", data);
          console.log("INSERT ERROR:", error);

          if (error) {
            alert("Failed to save withdrawal.");
            return;
          }

          amountInput.value = "";
          categorySelect.selectedIndex = 0;
          descriptionInput.value = "";
          setRecurringToggle(false);

          alert("Withdrawal saved.");
        } catch (err) {
          console.error("Unexpected error:", err);
          alert("Something went wrong while saving.");
        } finally {
          submitWithdrawalBtn.disabled = false;
          submitWithdrawalBtn.textContent = originalButtonText;
        }
      });

      initWithdrawalPage();
    </script>
  </body>
</html>
